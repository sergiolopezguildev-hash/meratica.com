{% if config.extra.giscus and config.extra.giscus.enabled %}
<section class="comments" id="comentarios" aria-labelledby="comments-title">
  <h2 id="comments-title">{{ trans(key="comments_title", lang=lang) }}</h2>
  <p class="comments-note">{{ trans(key="comments_note", lang=lang) }}</p>
  <div class="giscus"></div>
  <script
    src="https://giscus.app/client.js"
    data-repo="{{ config.extra.giscus.repo }}"
    data-repo-id="{{ config.extra.giscus.repo_id }}"
    data-category="{{ config.extra.giscus.category }}"
    data-category-id="{{ config.extra.giscus.category_id }}"
    data-mapping="{{ config.extra.giscus.mapping | default(value='pathname') }}"
    data-strict="{{ config.extra.giscus.strict | default(value='0') }}"
    data-reactions-enabled="{{ config.extra.giscus.reactions_enabled | default(value='1') }}"
    data-emit-metadata="{{ config.extra.giscus.emit_metadata | default(value='0') }}"
    data-input-position="{{ config.extra.giscus.input_position | default(value='bottom') }}"
    data-theme="{{ config.extra.giscus.theme | default(value='preferred_color_scheme') }}"
    data-lang="{{ lang }}"
    data-loading="{{ config.extra.giscus.loading | default(value='lazy') }}"
    crossorigin="anonymous"
    async
  ></script>
  <noscript>
    <p>{{ trans(key="comments_noscript", lang=lang) }}</p>
  </noscript>
</section>
{% endif %}

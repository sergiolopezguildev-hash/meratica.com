{% extends "base.html" %}

{% block content %}
<section class="error-page container narrow">
  <p class="error-code">404</p>
  <h1>Página no encontrada</h1>
  <p>La URL que buscas no existe o se ha movido. Prueba con el blog o vuelve al inicio.</p>
  <div class="hero-actions">
    <a class="btn btn-primary" href="{{ get_url(path='@/_index.md') }}">Ir al inicio</a>
    <a class="btn btn-ghost" href="{{ get_url(path='@/blog/_index.md') }}">Ir al blog</a>
  </div>
</section>
{% endblock content %}

{% extends "base.html" %}

{% block content %}
<section class="error-page container narrow">
  <p class="error-code">404</p>
  <h1>{{ trans(key="not_found_title", lang=lang) }}</h1>
  <p>{{ trans(key="not_found_text", lang=lang) }}</p>
  <div class="hero-actions">
    <a class="btn btn-primary" href="{% if lang == 'en' %}/en/{% else %}/{% endif %}">{{ trans(key="not_found_home", lang=lang) }}</a>
    <a class="btn btn-ghost" href="{% if lang == 'en' %}/en/blog/{% else %}/blog/{% endif %}">{{ trans(key="not_found_blog", lang=lang) }}</a>
  </div>
</section>
{% endblock content %}

# Cloudflare Workers + assets estáticos (flujo oficial Zola)
# https://www.getzola.org/documentation/deployment/cloudflare-workers/
#
# En el dashboard puedes dejar el deploy command por defecto:
#   npx wrangler deploy
# Wrangler ejecutará [build] → build.sh → zola build → sube ./public

name = "meratica"
compatibility_date = "2026-01-01"

[build]
command = "bash ./build.sh"

[assets]
directory = "./public"
not_found_handling = "404-page"

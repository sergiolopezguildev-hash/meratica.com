# Cloudflare Pages / Wrangler — configuración explícita (evita autoconfig Hugo vs Zola)
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "meratica"
compatibility_date = "2026-01-01"
pages_build_output_dir = "./public"

# En el dashboard de Pages (Settings → Builds):
#   Build command:
#     if [ "$CF_PAGES_BRANCH" = "main" ]; then zola build; else zola build --base-url $CF_PAGES_URL; fi
#   Build output directory: public
#   Framework preset: Zola (o None si defines el comando a mano)
#   Env: ZOLA_VERSION=0.22.1
